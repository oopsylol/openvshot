name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release-windows:
    name: Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install desktop dependencies
        shell: pwsh
        working-directory: apps/desktop
        run: npm install

      - name: Build Windows desktop installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build_desktop_installer.ps1

      - name: Build Windows CLI bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build_cli_bundle_windows.ps1

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: beta-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            release/openvshot-cli-windows-x64.exe
            release/openvshot-cli-windows-x64.zip
          if-no-files-found: error

  release-macos:
    name: Release macOS
    runs-on: macos-latest
    env:
      OPENVSHOT_MAC_DIRECT_DISTRIBUTION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Build macOS desktop bundle
        shell: bash
        run: bash ./build_desktop_installer_macos.sh

      - name: Build macOS CLI bundle
        shell: bash
        run: bash ./build_cli_bundle_macos.sh

      - name: Prepare macOS direct distribution support files
        shell: bash
        run: bash ./prepare_macos_direct_distribution.sh

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: beta-macos
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            release/openvshot-macos-direct-support.zip
            release/openvshot-cli-macos-*
            release/openvshot-cli-macos-*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - release-windows
      - release-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: beta-windows
          path: release-assets/windows

      - name: Download macOS assets
        uses: actions/download-artifact@v4
        with:
          name: beta-macos
          path: release-assets/macos

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == *beta* ]]; then
            RELEASE_FLAG="--prerelease"
          else
            RELEASE_FLAG=""
          fi
          mapfile -t ASSETS < <(
            find release-assets -type f \( \
              -name "*.exe" -o \
              -name "*.dmg" -o \
              -name "*.zip" -o \
              -name "*.tar.gz" -o \
              -name "openvshot-cli-macos-arm64" -o \
              -name "openvshot-cli-macos-x64" -o \
              -name "openvshot-cli-macos-x86_64" -o \
              -name "openvshot-cli-macos-universal" \
            \) | sort
          )
          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "No release assets found."
            exit 1
          fi
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ASSETS[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ASSETS[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "OpenVshot ${GITHUB_REF_NAME}" \
              --generate-notes \
              ${RELEASE_FLAG}
          fi
