name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install desktop dependencies
        shell: pwsh
        working-directory: apps/desktop
        run: npm install

      - name: Build Windows installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build_desktop_installer.ps1

      - name: List Windows release files
        if: ${{ always() }}
        shell: pwsh
        run: |
          if (Test-Path "apps/desktop/release") {
            Get-ChildItem -Recurse "apps/desktop/release" | Select-Object FullName, Length
          } else {
            Write-Host "apps/desktop/release not found"
          }

      - name: Upload Windows artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop/release/**
          if-no-files-found: error

  build-macos:
    name: macOS Installer
    runs-on: macos-latest
    env:
      CSC_NAME: ${{ secrets.CSC_NAME }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Prepare App Store Connect API key
        if: ${{ env.APPLE_API_KEY != '' }}
        shell: bash
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY" > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Import Apple signing certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.P12_PASSWORD != '' }}
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD_VALUE="${KEYCHAIN_PASSWORD:-github-actions}"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD_VALUE" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD_VALUE" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD_VALUE" "$KEYCHAIN_PATH"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build macOS installer
        shell: bash
        run: bash ./build_desktop_installer_macos.sh

      - name: List macOS release files
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -d "apps/desktop/release" ]]; then
            find "apps/desktop/release" -maxdepth 3 -print
          else
            echo "apps/desktop/release not found"
          fi

      - name: Upload macOS artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: apps/desktop/release/**
          if-no-files-found: error
